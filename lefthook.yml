commit-msg:
  commands:
    block-claude:
      run: bash scripts/block-claude-commit-msg.sh {1}

pre-commit:
  parallel: false
  commands:
    gofmt:
      run: |
        drift=$(gofmt -l cmd internal pkg sources)
        if [ -n "$drift" ]; then
          echo "gofmt drift in:" >&2
          echo "$drift" >&2
          exit 1
        fi
    go-work-sync:
      run: |
        go work sync
        git diff --exit-code -- go.mod go.sum go.work go.work.sum sources/dmhy/go.mod sources/dmhy/go.sum
    go:
      run: |
        if ! command -v golangci-lint >/dev/null 2>&1; then
          echo "golangci-lint not found. Install it with:" >&2
          echo "  go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2" >&2
          exit 127
        fi
        for m in . sources/dmhy; do
          echo "==> module $m"
          (cd "$m" \
            && go vet ./... \
            && go build ./... \
            && go build -tags=conformance ./... \
            && go test -race -count=1 -tags=conformance ./... \
            && golangci-lint run ./...) || exit 1
        done
    binaries:
      run: |
        go build -trimpath -o bin/takuhai ./cmd/takuhai
        (cd sources/dmhy && go build -trimpath -o ../../bin/takuhai-dmhy ./cmd/takuhai-dmhy)
    smoke:
      run: go test -tags=smoke -run TestSmoke -count=1 ./cmd/takuhai
    n8n:
      run: |
        cd integrations/n8n
        corepack enable
        corepack pnpm install --frozen-lockfile
        corepack pnpm build
