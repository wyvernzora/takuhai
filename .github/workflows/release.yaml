name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  verify:
    name: verify
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.verify.outputs.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$version" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "version must look like v0.1.0, got $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify release commit is on main with passing CI
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git fetch --force --no-tags origin \
            "+refs/tags/$VERSION:refs/tags/$VERSION" \
            +refs/heads/main:refs/remotes/origin/main

          tagged_sha="$(git rev-parse "$VERSION^{commit}")"
          echo "sha=$tagged_sha" >> "$GITHUB_OUTPUT"
          if ! git merge-base --is-ancestor "$tagged_sha" origin/main; then
            echo "::error::Release tag $VERSION points to $tagged_sha, which is not reachable from origin/main."
            exit 1
          fi

          ci_run_url="$(
            gh api "repos/$REPOSITORY/actions/workflows/ci.yml/runs" \
              --method GET \
              -f branch=main \
              -f event=push \
              -f head_sha="$tagged_sha" \
              -f status=completed \
              --jq '.workflow_runs[] | select(.conclusion == "success") | .html_url' |
              head -n 1
          )"
          if [ -z "$ci_run_url" ]; then
            echo "::error::Release commit $tagged_sha does not have a successful completed ci.yml push run on main."
            exit 1
          fi

          echo "Release commit $tagged_sha is on main and passed CI: $ci_run_url"

  publish-images:
    name: publish ${{ matrix.component }}
    needs: verify
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: takuhai
            image: ghcr.io/${{ github.repository }}
            context: .
            file: Dockerfile
            build_args: |
              BUILD_DIR=.
              CMD_PKG=./cmd/takuhai
            description: Anime release indexer + match work queue (REST + MCP)
          - component: crawler-dmhy
            image: ghcr.io/${{ github.repository }}/crawler-dmhy
            context: .
            file: Dockerfile
            build_args: |
              BUILD_DIR=sources/dmhy
              CMD_PKG=./cmd/takuhai-dmhy
            description: DMHY stateless crawler (POST /crawl)
          - component: n8n-nodes
            image: ghcr.io/${{ github.repository }}/n8n-nodes
            context: .
            file: integrations/n8n/Dockerfile
            build_args: ''
            description: takuhai custom nodes for n8n (init container)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check out release commit
        run: git checkout --detach "${{ needs.verify.outputs.sha }}"

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.verify.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.component }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.verify.outputs.version }}
            org.opencontainers.image.revision=${{ needs.verify.outputs.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.verify.outputs.version }}
            COMMIT=${{ needs.verify.outputs.sha }}
            ${{ matrix.build_args }}
          cache-from: type=gha,scope=release-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.component }}
          provenance: false

  github-release:
    name: github release
    needs: [verify, publish-images]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "GitHub release $VERSION already exists."
            exit 0
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --verify-tag
